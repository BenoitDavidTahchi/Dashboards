                <div class="tooltip-container absolute top-full right-0 w-72 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-2xl p-5 max-h-80 overflow-y-auto z-[999]" id="tooltip-roles"></div>
            </div>

            <div class="kpi-card glass-card p-6 rounded-3xl border border-slate-200 dark:border-slate-800 flex items-center gap-5 transition-all hover:-translate-y-1 cursor-default">
                <div class="p-4 bg-amber-500/10 text-amber-600 dark:text-amber-400 rounded-2xl"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="calendar-plus" aria-hidden="true" class="lucide lucide-calendar-plus h-7 w-7"><path d="M16 19h6"></path><path d="M16 2v4"></path><path d="M19 16v6"></path><path d="M21 12.598V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h8.5"></path><path d="M3 10h18"></path><path d="M8 2v4"></path></svg></div>
                <div><p class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-1">Nouveaux</p><p class="text-3xl font-extrabold" id="kpi-new">4</p></div>
                <div class="tooltip-container absolute top-full right-0 w-72 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-2xl p-5 max-h-80 overflow-y-auto z-[999]" id="tooltip-new"></div>
            </div>
        </div>

        <!-- Middle Section: Trends -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="glass-card p-8 rounded-3xl border border-slate-200 dark:border-slate-800 lg:col-span-2 shadow-sm">
                <h2 class="text-base font-bold text-slate-500 dark:text-slate-400 mb-6 flex items-center gap-2 text-left"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="line-chart" aria-hidden="true" class="lucide lucide-line-chart h-4 w-4 text-brand-500"><path d="M3 3v16a2 2 0 0 0 2 2h16"></path><path d="m19 9-5 5-4-4-3 3"></path></svg> Tendance d'Onboarding (12 mois)</h2>
                <div class="h-72"><canvas id="trendChart" style="box-sizing: border-box; display: block; height: 288px; width: 664.9px;" width="498" height="216"></canvas></div>
            </div>
            <div class="glass-card p-8 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm">
                <h2 class="text-base font-bold text-slate-500 dark:text-slate-400 mb-6 flex items-center gap-2 text-left"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="bar-chart-3" aria-hidden="true" class="lucide lucide-bar-chart-3 h-4 w-4 text-blue-500"><path d="M3 3v16a2 2 0 0 0 2 2h16"></path><path d="M18 17V9"></path><path d="M13 17V5"></path><path d="M8 17v-3"></path></svg> Top 5 Rôles</h2>
                <div class="h-72"><canvas id="rolesChart" style="box-sizing: border-box; display: block; height: 288px; width: 283.1px;" width="212" height="216"></canvas></div>
            </div>
        </div>

        <!-- Bottom Section: Societies & Table -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="glass-card p-8 rounded-3xl border border-slate-200 dark:border-slate-800 flex flex-col shadow-xl">
                <h2 class="text-base font-bold text-slate-500 dark:text-slate-400 mb-6 flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="pie-chart" aria-hidden="true" class="lucide lucide-pie-chart h-4 w-4 text-emerald-500"><path d="M21 12c.552 0 1.005-.449.95-.998a10 10 0 0 0-8.953-8.951c-.55-.055-.998.398-.998.95v8a1 1 0 0 0 1 1z"></path><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path></svg> Répartition Sociétés</h2>
                <div class="flex-grow flex items-center justify-center relative min-h-[350px]">
                    <canvas id="companiesChart" style="box-sizing: border-box; display: block; height: 500px; width: 283.1px;" width="212" height="375"></canvas>
                </div>
            </div>

            <div class="lg:col-span-2 glass-card rounded-3xl border border-slate-200 dark:border-slate-800 flex flex-col overflow-hidden shadow-2xl">
                <div class="p-8 border-b dark:border-slate-800 flex justify-between items-center bg-white dark:bg-slate-900/50">
                    <h2 class="text-xl font-extrabold flex items-center gap-3">Annuaire <span class="bg-brand-500 text-white text-[10px] px-2 py-1 rounded-lg uppercase tracking-widest">Live</span></h2>
                    <div class="flex items-center gap-4">
                        <div class="relative group">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="search" aria-hidden="true" class="lucide lucide-search h-4 w-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><path d="m21 21-4.34-4.34"></path><circle cx="11" cy="11" r="8"></circle></svg>
                            <input type="text" id="searchInput" oninput="renderTable(this.value)" placeholder="Filtrer SFS, nom, société..." class="pl-11 pr-12 py-3 border-2 border-slate-100 dark:border-slate-800 rounded-2xl text-sm bg-slate-50 dark:bg-slate-950 w-64 sm:w-96 focus:ring-4 focus:ring-brand-500/20 focus:border-brand-500 outline-none transition-all font-medium">
                            <button id="clearSearch" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-brand-500 transition-colors hidden" onclick="document.getElementById('searchInput').value=''; renderTable('');">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="x-circle" aria-hidden="true" class="lucide lucide-x-circle h-5 w-5"><circle cx="12" cy="12" r="10"></circle><path d="m15 9-6 6"></path><path d="m9 9 6 6"></path></svg>
                            </button>
                        </div>
                        
                        
                    </div>
                </div>
                <div class="overflow-x-auto h-[500px]">
                    <table id="usersTable">
                        <thead class="bg-slate-50 dark:bg-slate-900/80 text-slate-400 text-[10px] uppercase font-black tracking-widest sticky top-0 z-20 border-b dark:border-slate-800 shadow-sm backdrop-blur-md">
                            <tr id="usersTableHeader"><th class="px-6 py-4 resizable-th text-left" style="width: 220px;">Nom<div class="resizer"></div></th><th class="px-6 py-4 resizable-th text-left" style="width: 160px;">Société<div class="resizer"></div></th><th class="px-6 py-4 resizable-th text-left" style="width: 180px;">Rôle<div class="resizer"></div></th><th class="px-6 py-4 resizable-th text-left" style="width: 120px;">Statut<div class="resizer"></div></th><th class="px-6 py-4 resizable-th text-left" style="width: 140px;">Date Ajout<div class="resizer"></div></th></tr>
                        </thead>
                        <tbody id="usersTableBody" class="divide-y divide-slate-100 dark:divide-slate-900"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- DONNÉES ET ÉTAT ---
        const mockData = [
            { nom: "Benoit Tahchi", email: "benoit@cfl-immo.com", societe: "CFL IMMO", role: "Digital Delivery Manager", niveau: "Admin", telephone: "+32 400 00 00", statut: "Actif", date_ajout: new Date().toISOString() },
            { nom: "Alice Dubois", email: "alice@buildtech.com", societe: "BuildTech", role: "BIM Manager", niveau: "Membre", telephone: "", statut: "En attente", date_ajout: "2023-11-15T10:00:00Z" },
            { nom: "Jean SFS", email: "jean@sfs.com", societe: "SFS Group", role: "Ingénieur Façade", niveau: "Membre", telephone: "", statut: "Actif", date_ajout: "2024-01-05T10:00:00Z" }
        ];

        let appData = [];
        let dashboardConfig = { logo: null };
        let charts = {};
        let isDarkMode = false;
        let columnWidths = {};
        const allColumns = [
            { id: 'nom', label: 'Nom', width: '220px' },
            { id: 'email', label: 'E-mail', width: '220px' },
            { id: 'societe', label: 'Société', width: '160px' },
            { id: 'role', label: 'Rôle', width: '180px' },
            { id: 'niveau', label: 'Accès', width: '120px' },
            { id: 'telephone', label: 'Tel', width: '140px' },
            { id: 'statut', label: 'Statut', width: '120px' },
            { id: 'date_ajout', label: 'Date Ajout', width: '140px' }
        ];
        let visibleColumns = ['nom', 'societe', 'role', 'statut', 'date_ajout'];

        function removeAccents(str) {
            if (!str) return '';
            return String(str).normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        }

        function cleanData(data) {
            if (!Array.isArray(data)) return [];
            return data.map(u => {
                let d = new Date(u.date_ajout);
                if (isNaN(d.getTime())) d = new Date('2020-01-01');
                const s = (v) => {
                    let txt = String(v || '').trim();
                    if (['undefined', 'null', 'inconnu', ''].includes(txt.toLowerCase())) return '-';
                    return txt;
                };
                return {
                    nom: s(u.nom), email: s(u.email), societe: s(u.societe),
                    role: s(u.role), niveau: s(u.niveau), telephone: s(u.telephone),
                    statut: s(u.statut), date_ajout: d.toISOString()
                };
            }).filter(u => u.nom !== '-');
        }

        // --- CYCLE DE VIE ---
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            if (localStorage.getItem('theme') === 'dark' || window.matchMedia('(prefers-color-scheme: dark)').matches) toggleTheme(true);
            allColumns.forEach(c => columnWidths[c.id] = c.width);
            
            const embedded = document.getElementById('embedded-data').textContent;
            if (embedded && embedded !== 'null' && embedded.trim() !== '') {
                try {
                    const p = JSON.parse(embedded);
                    appData = cleanData(Array.isArray(p) ? p : (p.users || []));
                    dashboardConfig.logo = p.logo || null;
                } catch(e) { appData = cleanData(mockData); }
            } else { appData = cleanData(mockData); }

            if (dashboardConfig.logo) {
                const img = document.getElementById('company-logo');
                if(img) { img.src = dashboardConfig.logo; img.classList.remove('hidden'); }
                const pl = document.getElementById('logo-placeholder'); if(pl) pl.classList.add('hidden');
            }
            
            initColumnSettings();
            setTimeout(updateDashboard, 100);

            document.getElementById('excel-upload')?.addEventListener('change', handleFileUpload);
            
            document.addEventListener('click', (e) => {
                const dropdown = document.getElementById('columnSettingsDropdown');
                const btn = document.getElementById('columnSettingsBtn');
                if (dropdown && !dropdown.classList.contains('hidden')) {
                    if (!dropdown.contains(e.target) && !btn.contains(e.target)) {
                        dropdown.classList.add('hidden');
                    }
                }
            });

            document.getElementById('logo-upload')?.addEventListener('change', (e) => {
                const f = e.target.files[0]; if(!f) return;
                const r = new FileReader();
                r.onload = (ev) => {
                    dashboardConfig.logo = ev.target.result;
                    const img = document.getElementById('company-logo');
                    if(img) { img.src = ev.target.result; img.classList.remove('hidden'); }
                    document.getElementById('logo-placeholder')?.classList.add('hidden');
                };
                r.readAsDataURL(f);
            });
        });

        // --- FONCTIONS UI ---
        function toggleTheme(force = null) {
            isDarkMode = (force !== null) ? force : !document.documentElement.classList.contains('dark');
            document.documentElement.classList.toggle('dark', isDarkMode);
            const icon = document.getElementById('theme-icon');
            if(icon) icon.setAttribute('data-lucide', isDarkMode ? 'sun' : 'moon');
            lucide.createIcons();
            Chart.defaults.color = isDarkMode ? '#cbd5e1' : '#64748b';
            if(Object.keys(charts).length > 0) updateDashboard();
        }

        function toggleColumnSettings(event) {
            if(event) event.stopPropagation();
            const dropdown = document.getElementById('columnSettingsDropdown');
            if(dropdown) dropdown.classList.toggle('hidden');
        }

        function initColumnSettings() {
            const container = document.getElementById('columnCheckboxes');
            if (!container) return;
            container.innerHTML = '';
            allColumns.forEach(col => {
                const isChecked = visibleColumns.includes(col.id) ? 'checked' : '';
                const label = document.createElement('label');
                label.className = "flex items-center gap-3 p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl cursor-pointer transition-colors";
                label.innerHTML = `
                    <input type="checkbox" value="${col.id}" ${isChecked} class="col-checkbox rounded-lg text-brand-500 focus:ring-brand-500 h-4 w-4">
                    <span class="text-sm font-semibold">${col.label}</span>
                `;
                label.querySelector('input').addEventListener('change', updateVisibleColumns);
                container.appendChild(label);
            });
        }

        function updateVisibleColumns() {
            const checkedBoxes = document.querySelectorAll('.col-checkbox:checked');
            visibleColumns = Array.from(checkedBoxes).map(cb => cb.value);
            renderTable();
        }

        function handleFileUpload(e) {
            const f = e.target.files[0]; if (!f) return;
            const r = new FileReader();
            r.onload = (ev) => {
                try {
                    const d = new Uint8Array(ev.target.result);
                    const wb = XLSX.read(d, {type: 'array', cellDates: true});
                    let ts = null, hi = 0;
                    for (let sn of wb.SheetNames) {
                        const sheet = wb.Sheets[sn];
                        const rd = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                        for (let i = 0; i < Math.min(30, rd.length); i++) {
                            if (!rd[i]) continue;
                            const rs = removeAccents(rd[i].join(' '));
                            if (['email', 'societe', 'role', 'ajoute'].some(k => rs.includes(k))) { ts = sn; hi = i; break; }
                        }
                        if (ts) break;
                    }
                    if (!ts) throw new Error("Format d'export ACC non détecté.");
                    const raw = XLSX.utils.sheet_to_json(wb.Sheets[ts], { range: hi, defval: "" }).map(row => {
                        const cr = {}; for (let k in row) cr[removeAccents(k)] = row[k];
                        const gv = (keys, def) => {
                            for (let k of keys) {
                                let fk = Object.keys(cr).find(x => x.includes(removeAccents(k)));
                                if (fk && cr[fk] !== undefined && cr[fk] !== null) return cr[fk];
                            } return def;
                        };
                        return {
                            nom: gv(['nom', 'name'], ""), email: gv(['email'], ""), societe: gv(['societe', 'company'], ""),
                            role: gv(['role'], ""), niveau: gv(['acces', 'access'], ""), telephone: gv(['tel'], ""),
                            statut: gv(['statut', 'status'], ""), date_ajout: gv(['ajoute', 'added', 'date'], null)
                        };
                    });
                    appData = cleanData(raw);
                    updateDashboard();
                    showToast(`${appData.length} membres chargés.`);
                } catch(err) { showToast(err.message, true); }
                e.target.value = '';
            };
            r.readAsArrayBuffer(f);
        }

        function showToast(m, error = false) {
            const t = document.getElementById('toast');
            if(!t) return;
            const ti = document.getElementById('toast-icon');
            document.getElementById('toast-message').innerText = m;
            if(ti) ti.className = `h-5 w-5 ${error ? 'text-brand-600' : 'text-emerald-500'}`;
            t.classList.add('animate-toast');
            t.classList.remove('opacity-0');
            setTimeout(() => { t.classList.remove('animate-toast'); t.classList.add('opacity-0'); }, 4000);
        }

        function updateDashboard() {
            calculateKPIs();
            updateTooltips();
            renderCharts();
            renderTable();
        }

        function calculateKPIs() {
            document.getElementById('kpi-total').innerText = appData.length;
            const comps = appData.map(u => u.societe).filter(s => s !== '-');
            document.getElementById('kpi-companies').innerText = new Set(comps).size;
            const roles = appData.map(u => u.role).filter(r => r !== '-');
            document.getElementById('kpi-roles').innerText = new Set(roles).size;
            const now = new Date(); now.setDate(now.getDate() - 30);
            document.getElementById('kpi-new').innerText = appData.filter(u => new Date(u.date_ajout) >= now).length;
        }

        function updateTooltips() {
            const tt = (id, list, title) => {
                const el = document.getElementById(id);
                if (el) el.innerHTML = `<h4 class="text-[10px] font-black uppercase text-slate-400 mb-3 border-b dark:border-slate-700 pb-2">${title}</h4>` + list.join('');
            };
            tt('tooltip-users', appData.slice(0, 100).map(u => `<div class="text-[11px] py-1.5 border-b dark:border-slate-700/50 last:border-0 truncate font-semibold"><i class="text-slate-400">#</i> ${u.nom} <span class="opacity-50 text-[9px]">(${u.societe})</span></div>`), "Membres");
            const countMap = (k) => {
                const c = {}; appData.forEach(u => { if(u[k] !== '-') c[u[k]] = (c[u[k]] || 0) + 1; });
                return Object.entries(c).sort((a,b)=>b[1]-a[1]).map(e => `<div class="flex justify-between text-[11px] py-1.5 border-b dark:border-slate-700/50"><span>${e[0]}</span><span class="font-black text-brand-500">${e[1]}</span></div>`);
            };
            tt('tooltip-companies', countMap('societe'), "Sociétés");
            tt('tooltip-roles', countMap('role'), "Rôles");
            const now = new Date(); now.setDate(now.getDate() - 30);
            tt('tooltip-new', appData.filter(u => new Date(u.date_ajout) >= now).map(u => `<div class="text-[11px] py-1.5"><b>${u.nom}</b> <span class="text-slate-400">chez</span> ${u.societe}</div>`), "Derniers ajoutés");
        }

        function renderCharts() {
            const ctxColors = ['#ef4444', '#3b82f6', '#8b5cf6', '#f59e0b', '#10b981', '#ec4899', '#6366f1', '#14b8a6', '#06b6d4', '#f43f5e'];
            const getCounts = (key) => {
                const c = {}; appData.forEach(u => { let v = u[key] === '-' ? 'Non assigné' : u[key]; c[v] = (c[v] || 0) + 1; });
                return Object.entries(c).sort((a,b)=>b[1]-a[1]);
            };

            ['trendChart', 'rolesChart', 'companiesChart'].forEach(id => { if(charts[id]) charts[id].destroy(); });

            const trendCtx = document.getElementById('trendChart');
            const rolesCtx = document.getElementById('rolesChart');
            const compCtx = document.getElementById('companiesChart');

            if (trendCtx) {
                const mc = {}; const months = []; for (let i = 11; i >= 0; i--) { let d = new Date(); d.setMonth(d.getMonth() - i); let k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; mc[k]=0; months.push(k); }
                appData.forEach(u => { let d = new Date(u.date_ajout); if(!isNaN(d.getTime())) { let k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; if(mc[k]!==undefined) mc[k]++; } });
                charts['trendChart'] = new Chart(trendCtx, {
                    type: 'line', data: { labels: months.map(m => m.split('-').reverse().join('/')), datasets: [{ data: months.map(m => mc[m]), borderColor: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.05)', fill: true, tension: 0.4, pointRadius: 4 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true }, x: { grid: { display: false } } } }
                });
            }

            if (rolesCtx) {
                const rd = getCounts('role').slice(0, 5);
                charts['rolesChart'] = new Chart(rolesCtx, {
                    type: 'bar', data: { labels: rd.map(r => r[0]), datasets: [{ data: rd.map(r => r[1]), backgroundColor: '#3b82f6', borderRadius: 10 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } }, onClick: (e, el) => { if(el.length) { const l = rd[el[0].index][0]; document.getElementById('searchInput').value = l; renderTable(l); } } }
                });
            }

            if (compCtx) {
                const cd = getCounts('societe');
                charts['companiesChart'] = new Chart(compCtx, {
                    type: 'doughnut', 
                    data: { labels: cd.map(c => c[0]), datasets: [{ data: cd.map(c => c[1]), backgroundColor: ctxColors, borderWidth: 0 }] },
                    options: { 
                        responsive: true, maintainAspectRatio: false, 
                        plugins: { 
                            legend: { 
                                display: true, position: 'right', 
                                labels: { padding: 15, usePointStyle: true, font: { size: 10, weight: '600' } } 
                            }
                        }, 
                        cutout: '75%', 
                        onClick: (e, el) => { if(el.length) { const l = cd[el[0].index][0]; document.getElementById('searchInput').value = l; renderTable(l); } } 
                    }
                });
            }
        }

        function renderTable(ft = null) {
            const input = document.getElementById('searchInput');
            if (!input) return;
            const filterVal = ft === null ? input.value : ft;
            
            const th = document.getElementById('usersTableHeader');
            const tb = document.getElementById('usersTableBody');
            const clear = document.getElementById('clearSearch');
            
            if (clear) filterVal.length > 0 ? clear.classList.remove('hidden') : clear.classList.add('hidden');
            if (th) th.innerHTML = ''; 
            if (tb) tb.innerHTML = '';

            visibleColumns.forEach(id => {
                const c = allColumns.find(x => x.id === id);
                if (!c) return;
                const cell = document.createElement('th');
                cell.className = "px-6 py-4 resizable-th text-left";
                cell.style.width = columnWidths[id];
                cell.innerText = c.label;
                const r = document.createElement('div');
                r.className = "resizer";
                cell.appendChild(r);
                r.addEventListener('mousedown', (e) => {
                    const startX = e.clientX, startW = cell.offsetWidth;
                    const onMove = (em) => { let nw = `${startW + (em.clientX - startX)}px`; cell.style.width = nw; columnWidths[id] = nw; };
                    const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
                    document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
                });
                if (th) th.appendChild(cell);
            });

            const filterClean = removeAccents(filterVal);
            const filtered = appData.filter(u => {
                if (!filterClean) return true;
                return removeAccents(u.nom).includes(filterClean) ||
                       removeAccents(u.societe).includes(filterClean) ||
                       removeAccents(u.role).includes(filterClean) ||
                       removeAccents(u.email).includes(filterClean);
            }).sort((a,b) => new Date(b.date_ajout) - new Date(a.date_ajout));

            filtered.forEach(u => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors border-b dark:border-slate-800/50 last:border-0";
                visibleColumns.forEach(id => {
                    const td = document.createElement('td');
                    td.className = "px-6 py-4 text-xs font-medium text-left";
                    if (id === 'nom') { td.className += " font-bold text-slate-900 dark:text-slate-100"; td.innerText = u.nom; }
                    else if (id === 'societe') { td.innerHTML = `<span class="px-3 py-1 rounded-full bg-slate-100 dark:bg-slate-800 border dark:border-slate-700 text-[10px] text-slate-600 dark:text-slate-300 shadow-sm">${u.societe}</span>`; }
                    else if (id === 'statut') { 
                        const active = (u.statut || '').toLowerCase().includes('actif');
                        td.innerHTML = `<span class="px-2 py-1 rounded-lg text-[9px] font-black uppercase ${active ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'}">${u.statut || '-'}</span>`; 
                    }
                    else if (id === 'date_ajout') { td.innerText = new Date(u.date_ajout).toLocaleDateString('fr-FR'); }
                    else { td.innerText = u[id] || '-'; }
                    tr.appendChild(td);
                });
                if (tb) tb.appendChild(tr);
            });
        }

        // --- FONCTION EXPORT FIGÉ ---
        function exportDashboard(format) {
            try {
                showToast(`Préparation export ${format.toUpperCase()}...`);
                updateDashboard();

                const clone = document.documentElement.cloneNode(true);
                const p = { users: appData, logo: dashboardConfig.logo };
                
                const embedScript = clone.querySelector('#embedded-data');
                if (embedScript) embedScript.textContent = JSON.stringify(p);
                
                // On vide les tableaux pour forcer le rendu propre au chargement
                ['usersTableBody', 'tooltip-users', 'tooltip-companies', 'tooltip-roles', 'tooltip-new'].forEach(id => {
                    let el = clone.querySelector(`#${id}`); if(el) el.innerHTML = '';
                });
                
                let s = clone.querySelector('#searchInput'); if(s) { s.value = ''; s.removeAttribute('value'); }

                // --- MODE FIGÉ : Suppression des interfaces de modification ---
                const editControls = clone.querySelector('#edit-controls');
                if(editControls) editControls.remove();
                
                const settingsWrapper = clone.querySelector('#settings-wrapper');
                if(settingsWrapper) settingsWrapper.remove();
                
                const logoLabel = clone.querySelector('#logo-label');
                if(logoLabel) {
                    logoLabel.classList.remove('cursor-pointer');
                    logoLabel.removeAttribute('title');
                    logoLabel.querySelector('#logo-placeholder')?.remove();
                    logoLabel.querySelector('#logo-upload')?.remove();
                    logoLabel.querySelector('#logo-box')?.classList.remove('border-dashed');
                }

                const prefix = format === 'aspx' ? '<!DOCTYPE html>\n' : '';
                const content = prefix + clone.outerHTML;
                
                const blob = new Blob(['\uFEFF', content], { type: 'text/html;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `Dashboard_ACC_Fige_${new Date().toISOString().split('T')[0]}.${format}`;
                document.body.appendChild(a);
                a.click();
                
                setTimeout(() => { 
                    document.body.removeChild(a); 
                    URL.revokeObjectURL(url); 
                    showToast("Dashboard figé prêt !"); 
                }, 100);
            } catch (err) { showToast("Erreur export", true); }
        }
    </script>
